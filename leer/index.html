<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telurines._.xd - Libros y traducciones</title>
    <link rel="icon" type="image/png" href="../assets/iconx.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5dc;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background-color: #9cb836;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 3px solid #7a9428;
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            filter: brightness(0) invert(1);
            transition: transform 0.2s;
        }

        .logo-link:hover .logo-img {
            transform: scale(1.1) rotate(5deg);
        }

        .site-title {
            color: #1a1a1a;
            font-size: 24px;
            font-weight: bold;
        }

        .site-subtitle {
            color: #333;
            font-size: 14px;
            margin-left: 10px;
        }

        /* Main Container */
        .container {
            display: flex;
            min-height: calc(100vh - 70px);
        }

        /* Left Sidebar */
        .sidebar {
            width: 350px;
            background-color: #e8e4b8;
            border-right: 2px solid #9cb836;
            overflow-y: auto;
        }

        .book-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 2px solid #9cb836;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .book-item:hover {
            background-color: #d4d0a0;
        }

        .book-item.active {
            background-color: #9cb836;
            color: white;
        }

        .book-thumb {
            width: 60px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .book-info-small h3 {
            font-size: 16px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .book-info-small p {
            font-size: 13px;
            opacity: 0.8;
        }

        /* Right Content */
        .content {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .book-cover-large {
            width: 280px;
            height: 380px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .book-details {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .book-details h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #1a1a1a;
        }

        .detail-row {
            font-size: 18px;
            margin: 12px 0;
            color: #333;
        }

        .detail-label {
            font-weight: 600;
        }

        /* Download Section */
        .download-section {
            margin-top: 40px;
            width: 100%;
            max-width: 600px;
        }

        .download-header {
            background-color: #9cb836;
            color: #1a1a1a;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px 8px 0 0;
        }

        .download-list {
            background-color: #e8e4b8;
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }

        .download-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #9cb836;
        }

        .download-item:last-child {
            border-bottom: none;
        }

        .download-info {
            font-size: 15px;
            color: #333;
        }

        .download-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: #1a1a1a;
            transition: transform 0.2s;
            text-decoration: none;
        }

        .download-btn:hover {
            transform: translateY(3px);
            color: #5a7a1a;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            font-size: 18px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                max-height: 300px;
            }
            
            .book-cover-large {
                width: 200px;
                height: 270px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="../index.html" class="logo-link" title="Home">
            <img src="/assets/icon.png" alt="Telurines Logo" class="logo-img">
        </a>
        <span class="site-title">Telurines._.xd</span>
        <span class="site-subtitle">• Libros y traducciones</span>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Left Sidebar - Book List -->
        <aside class="sidebar" id="sidebar">
            <!-- Book items will be generated by JavaScript -->
        </aside>

        <!-- Right Content - Book Details -->
        <main class="content" id="content">
            <!-- Content will be generated by JavaScript -->
        </main>
    </div>

    <script>
        // ============================================
        // EDIT THIS ARRAY TO ADD/REMOVE BOOKS
        // ============================================
        const books = [
            {
                id: 1,
                title: "Kijin Gentoushou - 5 Volumes",
                language: "English & Español",
                pages: 999,
                formats: "PDF, Online",
                cover: "/leer/kijingentoushou/cover.jpg",
                downloads: [
                    { filetype: "PDF", language: "English", translator: "Seven Seas Entertainment", url: "./kijingentoushou/index.html" },
                    { filetype: "Nothing & read online", language: "Español", translator: "Xi & Telurines", url: "./kijingentoushou/index.html" }
                ]
            },
            {
                id: 2,
                title: "Manga",
                language: "Japanese",
                pages: 183,
                formats: "PDF",
                cover: "/leer/imgs/mangaxd.webp",
                downloads: [
                    { filetype: "PDF", language: "Aún sin traducción: Chino", translator: "None", url: "https://drive.google.com/file/d/1-0WZnDNluAWvV-emcv-Dom0w1OrLjniD/view?usp=drivesdk" },
                ]
            }
            // Add more books here following the same structure
            
        ];

        // State
        let selectedBookId = books.length > 0 ? books[0].id : null;

        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const content = document.getElementById('content');

        // Render Sidebar
        function renderSidebar() {
            sidebar.innerHTML = '';
            
            books.forEach(book => {
                const item = document.createElement('div');
                item.className = `book-item ${book.id === selectedBookId ? 'active' : ''}`;
                item.onclick = () => selectBook(book.id);
                
                item.innerHTML = `
                    <img src="${book.cover}" alt="${book.title}" class="book-thumb">
                    <div class="book-info-small">
                        <h3>${book.title}</h3>
                        <p>${book.language}</p>
                    </div>
                `;
                
                sidebar.appendChild(item);
            });
        }

        // Render Content
        function renderContent() {
            if (!selectedBookId) {
                content.innerHTML = `
                    <div class="empty-state">
                        <p>No books available</p>
                    </div>
                `;
                return;
            }

            const book = books.find(b => b.id === selectedBookId);
            
            const downloadsHtml = book.downloads.map(dl => `
                <div class="download-item">
                    <span class="download-info">
                        Download ${dl.filetype} - translation to ${dl.language} by ${dl.translator}
                    </span>
                    <a href="${dl.url}" target="_blank" class="download-btn" title="Download">
                        ⬇
                    </a>
                </div>
            `).join('');

            content.innerHTML = `
                <img src="${book.cover}" alt="${book.title}" class="book-cover-large">
                <div class="book-details">
                    <h1>${book.title}</h1>
                    <div class="detail-row">
                        <span class="detail-label">Language:</span> ${book.language}
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Pages:</span> ${book.pages}
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Formats:</span> ${book.formats}
                    </div>
                </div>
                
                <div class="download-section">
                    <div class="download-header">translations & download</div>
                    <div class="download-list">
                        ${downloadsHtml}
                    </div>
                </div>
            `;
        }

        // Select Book
        function selectBook(id) {
            selectedBookId = id;
            renderSidebar();
            renderContent();
        }

        // Initialize
        renderSidebar();
        renderContent();
    </script>
</body>
</html>
